<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>餐廳視覺網站</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }

    /* Hero 區塊高度控制 */
    #hero {
      background-color: #ffffff;
      padding: 60px 0;
    }

    /* 卡片圖片高度一致 */
    .card-img-top {
      object-fit: cover;
      height: 200px;
    }
  </style>
</head>

<body>

  <!-- Hero 主視覺 -->
  <section id="hero">
    <div class="container text-center">
      
      <!-- 主圖片 -->
      <img 
        src="https://picsum.photos/1200/500" 
        class="img-fluid rounded mb-4" 
        alt="餐廳主視覺"
      >

      <!-- 標題 -->
      <h1 class="mb-3">精緻餐飲體驗</h1>

      <!-- 副標 -->
      <p class="mb-4 text-muted">
        享受每一道料理的視覺與味覺藝術
      </p>

      <!-- CTA 按鈕 -->
      <button class="btn btn-primary px-4 py-2">
        立即訂位
      </button>

    </div>
  </section>


  <!-- 圖片 Grid 區塊 -->
  <section id="grid" class="py-5">
    <div class="container">

      <div class="text-center mb-5">
        <h2>人氣餐點</h2>
      </div>

      <div class="row g-4">

        <!-- 圖片 1 -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="ratio ratio-1x1">
            <img src="https://picsum.photos/400?random=1" class="img-fluid rounded" alt="">
          </div>
        </div>

        <!-- 圖片 2 -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="ratio ratio-1x1">
            <img src="https://picsum.photos/400?random=2" class="img-fluid rounded" alt="">
          </div>
        </div>

        <!-- 圖片 3 -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="ratio ratio-1x1">
            <img src="https://picsum.photos/400?random=3" class="img-fluid rounded" alt="">
          </div>
        </div>

        <!-- 圖片 4 -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="ratio ratio-1x1">
            <img src="https://picsum.photos/400?random=4" class="img-fluid rounded" alt="">
          </div>
        </div>

        <!-- 圖片 5 -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="ratio ratio-1x1">
            <img src="https://picsum.photos/400?random=5" class="img-fluid rounded" alt="">
          </div>
        </div>

        <!-- 圖片 6 -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="ratio ratio-1x1">
            <img src="https://picsum.photos/400?random=6" class="img-fluid rounded" alt="">
          </div>
        </div>

      </div>
    </div>
  </section>


  <!-- Card 列表區塊 -->
  <section id="cards" class="py-5 bg-white">
    <div class="container">

      <div class="text-center mb-5">
        <h2>精選料理</h2>
      </div>

      <div class="row g-4">

        <!-- Card 1 -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card h-100 shadow-sm border-0">
            <img src="https://picsum.photos/400/300?random=7" class="card-img-top" alt="">
            <div class="card-body">
              <h5 class="card-title">招牌牛排</h5>
              <p class="card-text text-muted">
                嚴選高品質牛肉，搭配主廚秘製醬汁。
              </p>
            </div>
          </div>
        </div>

        <!-- Card 2 -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card h-100 shadow-sm border-0">
            <img src="https://picsum.photos/400/300?random=8" class="card-img-top" alt="">
            <div class="card-body">
              <h5 class="card-title">義式海鮮</h5>
              <p class="card-text text-muted">
                新鮮海鮮結合經典義式風味。
              </p>
            </div>
          </div>
        </div>

        <!-- Card 3 -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card h-100 shadow-sm border-0">
            <img src="https://picsum.photos/400/300?random=9" class="card-img-top" alt="">
            <div class="card-body">
              <h5 class="card-title">精緻甜點</h5>
              <p class="card-text text-muted">
                完美結尾的甜點饗宴，入口即化。
              </p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>


  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
