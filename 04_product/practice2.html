<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商店首頁 - Carousel</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* 全螢幕輪播 */
    .carousel,
    .carousel-inner,
    .carousel-item {
      height: 100vh;
    }

    /* 圖片填滿且置中 */
    .carousel-item img {
      object-fit: cover;
      height: 100%;
    }

    /* Caption 位置優化 */
    .carousel-caption {
      bottom: 20%;
    }
  </style>
</head>

<body>

  <!-- Carousel -->
  <div id="mainCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel">

    <!-- Indicators -->
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="0" class="active"></button>
      <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="1"></button>
      <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="2"></button>
      <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="3"></button>
      <button type="button" data-bs-target="#mainCarousel" data-bs-slide-to="4"></button>
    </div>

    <!-- Slides -->
    <div class="carousel-inner">

      <!-- Slide 1 -->
      <div class="carousel-item active">
        <img src="https://picsum.photos/1920/1080?random=1" class="d-block w-100" alt="">
        <div class="carousel-caption text-center">
          <h1>極簡質感商店</h1>
          <p>探索高品質商品的全新體驗</p>
        </div>
      </div>

      <!-- Slide 2 -->
      <div class="carousel-item">
        <img src="https://picsum.photos/1920/1080?random=2" class="d-block w-100" alt="">
        <div class="carousel-caption text-center">
          <h1>精選商品</h1>
          <p>每一件商品都經過精心挑選</p>
        </div>
      </div>

      <!-- Slide 3 -->
      <div class="carousel-item">
        <img src="https://picsum.photos/1920/1080?random=3" class="d-block w-100" alt="">
        <div class="carousel-caption text-center">
          <h1>設計美學</h1>
          <p>融合功能與美感的完美平衡</p>
        </div>
      </div>

      <!-- Slide 4 -->
      <div class="carousel-item">
        <img src="https://picsum.photos/1920/1080?random=4" class="d-block w-100" alt="">
        <div class="carousel-caption text-center">
          <h1>現代生活風格</h1>
          <p>打造專屬你的生活品味</p>
        </div>
      </div>

      <!-- Slide 5 -->
      <div class="carousel-item">
        <img src="https://picsum.photos/1920/1080?random=5" class="d-block w-100" alt="">
        <div class="carousel-caption text-center">
          <h1>立即探索</h1>
          <p>開啟你的購物新體驗</p>
        </div>
      </div>

    </div>

    <!-- Controls -->
    <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
