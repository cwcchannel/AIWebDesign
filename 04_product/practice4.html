<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>學校形象畫廊 | PhotoSwipe 精品風格展示</title>

  <!-- PhotoSwipe CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/photoswipe@4.1.3/dist/photoswipe.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/photoswipe@4.1.3/dist/default-skin/default-skin.css"
  />

  <style>
    :root {
      --bg: #0f0d0b;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-border: rgba(255, 215, 160, 0.18);
      --gold: #d7b47a;
      --gold-soft: #f0dfbf;
      --text: #f6f1e8;
      --muted: #cbbda9;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius: 20px;
      --max-width: 1200px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      background:
        radial-gradient(circle at top, rgba(215, 180, 122, 0.14), transparent 35%),
        linear-gradient(180deg, #151210 0%, #0f0d0b 100%);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      line-height: 1.6;
      letter-spacing: 0.02em;
    }

    .page-shell {
      width: min(92%, var(--max-width));
      margin: 0 auto;
      padding: 56px 0 72px;
    }

    .hero {
      text-align: center;
      margin-bottom: 42px;
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 14px;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--gold-soft);
      font-size: 0.85rem;
      margin-bottom: 18px;
      backdrop-filter: blur(8px);
    }

    .hero h1 {
      margin: 0 0 14px;
      font-size: clamp(2.2rem, 4vw, 4rem);
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .hero p {
      width: min(760px, 92%);
      margin: 0 auto;
      color: var(--muted);
      font-size: 1.02rem;
    }

    .gallery-wrapper {
      padding: 28px;
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .gallery-header h2 {
      margin: 0;
      font-size: 1.4rem;
      color: var(--gold-soft);
      letter-spacing: 0.04em;
    }

    .gallery-header span {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .my-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 18px;
      margin: 0;
    }

    .my-gallery figure {
      margin: 0;
      overflow: hidden;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
    }

    .my-gallery figure:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
      border-color: rgba(215, 180, 122, 0.28);
    }

    .my-gallery a {
      display: block;
      position: relative;
      overflow: hidden;
      text-decoration: none;
    }

    .my-gallery img {
      display: block;
      width: 100%;
      height: 220px;
      object-fit: cover;
      transition: transform 0.5s ease, filter 0.5s ease;
    }

    .my-gallery figure:hover img {
      transform: scale(1.05);
      filter: brightness(1.04);
    }

    .my-gallery figcaption {
      padding: 14px 16px 16px;
      color: var(--text);
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.04));
    }

    .caption-title {
      display: block;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--gold-soft);
    }

    .caption-text {
      display: block;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .footer-note {
      text-align: center;
      margin-top: 22px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      .page-shell {
        padding-top: 36px;
      }

      .gallery-wrapper {
        padding: 18px;
      }

      .my-gallery img {
        height: 190px;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <div class="eyebrow">Prestige Campus Gallery</div>
      <h1>晨曦學院 · 學校形象展示</h1>
      <p>
        以高端、精品風格呈現校園空間、學習氛圍與人文美感。
        點擊任一縮圖，即可開啟全螢幕 PhotoSwipe 燈箱，滑動切換 5 張校園主題影像。
      </p>
    </section>

    <section class="gallery-wrapper">
      <div class="gallery-header">
        <div>
          <h2>校園精選畫廊</h2>
          <span>School Branding / Premium Visual Experience</span>
        </div>
        <span>共 5 張圖片</span>
      </div>

      <!-- PhotoSwipe Gallery Structure -->
      <div class="my-gallery" itemscope itemtype="http://schema.org/ImageGallery">
        <figure itemprop="associatedMedia" itemscope itemtype="http://schema.org/ImageObject">
          <a
            href="https://picsum.photos/1200/900?random=11"
            itemprop="contentUrl"
            data-size="1200x900"
          >
            <img
              src="https://picsum.photos/400/300?random=11"
              itemprop="thumbnail"
              alt="學校大門與校園入口"
            />
          </a>
          <figcaption itemprop="caption description">
            <span class="caption-title">校園入口</span>
            <span class="caption-text">展現學校品牌識別與迎賓氛圍</span>
          </figcaption>
        </figure>

        <figure itemprop="associatedMedia" itemscope itemtype="http://schema.org/ImageObject">
          <a
            href="https://picsum.photos/1200/900?random=12"
            itemprop="contentUrl"
            data-size="1200x900"
          >
            <img
              src="https://picsum.photos/400/300?random=12"
              itemprop="thumbnail"
              alt="現代化教學大樓"
            />
          </a>
          <figcaption itemprop="caption description">
            <span class="caption-title">教學大樓</span>
            <span class="caption-text">呈現專業、穩重且現代化的教育空間</span>
          </figcaption>
        </figure>

        <figure itemprop="associatedMedia" itemscope itemtype="http://schema.org/ImageObject">
          <a
            href="https://picsum.photos/1200/900?random=13"
            itemprop="contentUrl"
            data-size="1200x900"
          >
            <img
              src="https://picsum.photos/400/300?random=13"
              itemprop="thumbnail"
              alt="校園圖書館空間"
            />
          </a>
          <figcaption itemprop="caption description">
            <span class="caption-title">圖書館</span>
            <span class="caption-text">傳遞沉靜、知性與閱讀文化的核心形象</span>
          </figcaption>
        </figure>

        <figure itemprop="associatedMedia" itemscope itemtype="http://schema.org/ImageObject">
          <a
            href="https://picsum.photos/1200/900?random=14"
            itemprop="contentUrl"
            data-size="1200x900"
          >
            <img
              src="https://picsum.photos/400/300?random=14"
              itemprop="thumbnail"
              alt="學生互動與學習活動"
            />
          </a>
          <figcaption itemprop="caption description">
            <span class="caption-title">學生活動</span>
            <span class="caption-text">突顯多元參與與合作學習的教育精神</span>
          </figcaption>
        </figure>

        <figure itemprop="associatedMedia" itemscope itemtype="http://schema.org/ImageObject">
          <a
            href="https://picsum.photos/1200/900?random=15"
            itemprop="contentUrl"
            data-size="1200x900"
          >
            <img
              src="https://picsum.photos/400/300?random=15"
              itemprop="thumbnail"
              alt="校園綠地與建築景觀"
            />
          </a>
          <figcaption itemprop="caption description">
            <span class="caption-title">景觀綠地</span>
            <span class="caption-text">以自然與建築交融塑造精品校園氣質</span>
          </figcaption>
        </figure>
      </div>

      <div class="footer-note">
        點擊任一縮圖即可進入全螢幕燈箱檢視，左右切換瀏覽完整畫面。
      </div>
    </section>
  </main>

  <!-- Root element of PhotoSwipe. Must have class pswp -->
  <div class="pswp" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="pswp__bg"></div>

    <div class="pswp__scroll-wrap">
      <div class="pswp__container">
        <div class="pswp__item"></div>
        <div class="pswp__item"></div>
        <div class="pswp__item"></div>
      </div>

      <div class="pswp__ui pswp__ui--hidden">
        <div class="pswp__top-bar">
          <div class="pswp__counter"></div>

          <button class="pswp__button pswp__button--close" title="Close (Esc)"></button>
          <button class="pswp__button pswp__button--share" title="Share"></button>
          <button class="pswp__button pswp__button--fs" title="Toggle fullscreen"></button>
          <button class="pswp__button pswp__button--zoom" title="Zoom in/out"></button>

          <div class="pswp__preloader">
            <div class="pswp__preloader__icn">
              <div class="pswp__preloader__cut">
                <div class="pswp__preloader__donut"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="pswp__share-modal pswp__share-modal--hidden pswp__single-tap">
          <div class="pswp__share-tooltip"></div>
        </div>

        <button class="pswp__button pswp__button--arrow--left" title="Previous (arrow left)"></button>
        <button class="pswp__button pswp__button--arrow--right" title="Next (arrow right)"></button>

        <div class="pswp__caption">
          <div class="pswp__caption__center"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- PhotoSwipe JS -->
  <script src="https://unpkg.com/photoswipe@4.1.3/dist/photoswipe.min.js"></script>
  <script src="https://unpkg.com/photoswipe@4.1.3/dist/photoswipe-ui-default.min.js"></script>

  <script>
    (function () {
      function parseThumbnailElements(galleryElement) {
        const thumbNodes = galleryElement.querySelectorAll('figure');
        const items = [];

        thumbNodes.forEach(function (figureEl) {
          const linkEl = figureEl.querySelector('a');
          const size = linkEl.getAttribute('data-size').split('x');
          const captionEl = figureEl.querySelector('figcaption');
          const imgEl = linkEl.querySelector('img');

          const item = {
            src: linkEl.getAttribute('href'),
            w: parseInt(size[0], 10),
            h: parseInt(size[1], 10),
            title: captionEl ? captionEl.innerHTML : '',
            msrc: imgEl ? imgEl.getAttribute('src') : ''
          };

          item.el = figureEl;
          items.push(item);
        });

        return items;
      }

      function closest(el, fn) {
        return el && (fn(el) ? el : closest(el.parentNode, fn));
      }

      function onThumbnailsClick(event) {
        event.preventDefault();

        const e = event || window.event;
        const clickedFigure = closest(e.target, function (el) {
          return el.tagName && el.tagName.toUpperCase() === 'FIGURE';
        });

        if (!clickedFigure) {
          return;
        }

        const galleryElement = clickedFigure.parentNode;
        const figureNodes = Array.from(galleryElement.querySelectorAll('figure'));
        const index = figureNodes.indexOf(clickedFigure);

        if (index >= 0) {
          openPhotoSwipe(index, galleryElement);
        }

        return false;
      }

      function openPhotoSwipe(index, galleryElement, disableAnimation, fromURL) {
        const pswpElement = document.querySelector('.pswp');
        const items = parseThumbnailElements(galleryElement);

        const options = {
          galleryUID: galleryElement.getAttribute('data-pswp-uid') || '1',
          index: index,
          bgOpacity: 0.92,
          showHideOpacity: true,
          getThumbBoundsFn: function (idx) {
            const thumbnail = items[idx].el.querySelector('img');
            const rect = thumbnail.getBoundingClientRect();
            const pageYScroll = window.pageYOffset || document.documentElement.scrollTop;

            return { x: rect.left, y: rect.top + pageYScroll, w: rect.width };
          }
        };

        if (fromURL) {
          options.index = parseInt(index, 10) - 1;
        } else {
          options.index = parseInt(index, 10);
        }

        if (isNaN(options.index)) {
          return;
        }

        if (disableAnimation) {
          options.showAnimationDuration = 0;
        }

        const gallery = new PhotoSwipe(
          pswpElement,
          PhotoSwipeUI_Default,
          items,
          options
        );

        gallery.init();
      }

      function photoswipeParseHash() {
        const hash = window.location.hash.substring(1);
        const params = {};

        if (hash.length < 5) {
          return params;
        }

        const vars = hash.split('&');
        vars.forEach(function (item) {
          if (!item) {
            return;
          }
          const pair = item.split('=');
          if (pair.length < 2) {
            return;
          }
          params[pair[0]] = pair[1];
        });

        if (params.gid) {
          params.gid = parseInt(params.gid, 10);
        }

        return params;
      }

      const galleryElements = document.querySelectorAll('.my-gallery');

      galleryElements.forEach(function (galleryEl, i) {
        galleryEl.setAttribute('data-pswp-uid', i + 1);
        galleryEl.addEventListener('click', onThumbnailsClick);
      });

      const hashData = photoswipeParseHash();
      if (hashData.pid && hashData.gid) {
        openPhotoSwipe(
          hashData.pid,
          galleryElements[hashData.gid - 1],
          true,
          true
        );
      }
    })();
  </script>
</body>
</html>
