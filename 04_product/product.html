<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>C w C AI簡報筆</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- PhotoSwipe -->
  <link rel="stylesheet" href="https://unpkg.com/photoswipe@5/dist/photoswipe.css">

  <style>
    body {
      background: #F8FAFC;
      font-family: "Segoe UI", sans-serif;
    }

    .tech-bg {
      background: linear-gradient(135deg, #e0f2ff, #f3e8ff);
      position: relative;
    }

    .product-card {
      border-radius: 20px;
      padding: 30px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      max-width: 800px;
      margin: auto;
    }

    /* 主圖容器 */
    .main-image {
      text-align: center;
      margin-bottom: 20px;
    }

    .main-image a {
      display: inline-block;
      max-width: 100%;
    }

    /* 主圖：保留原始比例，不壓扁 */
    .main-image img {
      display: block;
      width: 100%;
      max-width: 400px;
      height: auto;
      object-fit: contain;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
      margin: 0 auto;
    }

    /* 縮圖 */
    .thumbnails {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .thumbnails img {
      width: 70px;
      height: 50px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      opacity: 0.6;
      transition: 0.3s;
    }

    .thumbnails img.active,
    .thumbnails img:hover {
      opacity: 1;
      transform: scale(1.05);
    }

    p {
      font-size: 1.1rem;
      line-height: 1.8;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    h2 {
      margin-top: 30px;
    }

    .feature {
      padding: 15px;
      border-left: 3px solid #4F8CFF;
      margin-bottom: 15px;
    }

    .btn-glow {
      background: linear-gradient(90deg, #4F8CFF, #A66CFF);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 30px;
    }
  </style>
</head>

<body>

<section class="tech-bg py-5">
  <div class="container">

    <div class="product-card">

      <h1>C w C AI簡報筆</h1>

      <!-- Gallery -->
      <div class="main-image" id="gallery">

        <!-- 主圖 -->
        <a id="mainLink" href="images/product1.png">
          <img id="mainImg" src="images/product1.png" alt="主圖">
        </a>

        <!-- 隱藏圖片（讓 PhotoSwipe 能滑動） -->
        <a href="images/product2.png" class="pswp-item d-none"></a>
        <a href="images/scene1.png" class="pswp-item d-none"></a>
        <a href="images/scene2.png" class="pswp-item d-none"></a>
        <a href="images/scene3.png" class="pswp-item d-none"></a>

      </div>

      <!-- 縮圖 -->
      <div class="thumbnails">
        <img src="images/product1.png" class="active" onclick="changeImage(this, 0)">
        <img src="images/product2.png" onclick="changeImage(this, 1)">
        <img src="images/scene1.png" onclick="changeImage(this, 2)">
        <img src="images/scene2.png" onclick="changeImage(this, 3)">
        <img src="images/scene3.png" onclick="changeImage(this, 4)">
      </div>

      <!-- 內容 -->
      <p>
        在簡報製作與呈現的過程中，許多人常面臨內容整理耗時、表達不精準，以及現場掌控不穩的問題。
        <strong>C w C AI簡報筆</strong>，正是為了解決這些痛點而誕生。
        它將人工智慧技術深度整合進簡報流程，全面提升效率與表現品質。
      </p>

      <h2>三大核心優勢</h2>

      <div class="feature"><strong>智慧內容優化</strong></div>
      <div class="feature"><strong>即時提示輔助</strong></div>
      <div class="feature"><strong>效率全面提升</strong></div>

      <div class="text-center mt-4">
        <button class="btn-glow">立即體驗</button>
      </div>

    </div>

  </div>
</section>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- 先處理所有圖片的實際尺寸 -->
<script>
  const links = document.querySelectorAll('#gallery a');

  function loadImageSize(src) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = function () {
        resolve({
          width: img.naturalWidth,
          height: img.naturalHeight
        });
      };
      img.onerror = function () {
        resolve({
          width: 1600,
          height: 1200
        });
      };
      img.src = src;
    });
  }

  async function initImageSizes() {
    for (const link of links) {
      const size = await loadImageSize(link.href);
      link.setAttribute('data-pswp-width', size.width);
      link.setAttribute('data-pswp-height', size.height);
    }
  }

  function changeImage(el, index) {
    const mainImg = document.getElementById("mainImg");
    const mainLink = document.getElementById("mainLink");
    const targetLink = links[index];

    mainImg.src = el.src;
    mainLink.href = targetLink.href;
    mainLink.setAttribute('data-pswp-width', targetLink.getAttribute('data-pswp-width'));
    mainLink.setAttribute('data-pswp-height', targetLink.getAttribute('data-pswp-height'));

    document.querySelectorAll('.thumbnails img').forEach(img => {
      img.classList.remove('active');
    });

    el.classList.add('active');
  }
</script>

<!-- PhotoSwipe -->
<script type="module">
  import PhotoSwipeLightbox from 'https://unpkg.com/photoswipe@5/dist/photoswipe-lightbox.esm.js';

  await initImageSizes();

  const lightbox = new PhotoSwipeLightbox({
    gallery: '#gallery',
    children: 'a',
    pswpModule: () => import('https://unpkg.com/photoswipe@5/dist/photoswipe.esm.js')
  });

  lightbox.init();
</script>

</body>
</html>
