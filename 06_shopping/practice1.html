<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顧客管理系統</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background-color: #f8f9fa;
}
.container {
  max-width: 1200px;
}
.table {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
}
.btn-custom {
  border-radius: 20px;
}
.loading-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  font-size: 1.5rem;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="loading-overlay" id="loading">處理中…</div>

<div class="container py-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">顧客管理系統</h3>
    <div>
      <button class="btn btn-dark btn-custom me-2" onclick="addCustomer()">新增顧客</button>
      <button class="btn btn-outline-dark btn-custom" onclick="recalculate()">重新計算</button>
    </div>
  </div>

  <!-- Message Box -->
  <div class="alert alert-info" role="alert">
    系統狀態：目前顯示所有顧客資料，可進行管理操作。
  </div>

  <!-- Table -->
  <div class="table-responsive">
    <table class="table table-hover align-middle text-center">
      <thead class="table-light">
        <tr>
          <th>顧客編號</th>
          <th>姓名</th>
          <th>電子郵件</th>
          <th>會員等級</th>
          <th>註冊日期</th>
          <th>累積消費</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="customerTable"></tbody>
    </table>
  </div>

</div>

<!-- Modal -->
<div class="modal fade" id="customerModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">顧客詳細資訊</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalContent"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="position-fixed top-0 end-0 p-3">
  <div id="toast" class="toast align-items-center text-white bg-dark border-0">
    <div class="d-flex">
      <div class="toast-body">顧客已成功新增</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const customers = [
  {id:1,name:"王小明",email:"a@test.com",level:"一般",date:"2024-01-01",amount:1200},
  {id:2,name:"李小華",email:"b@test.com",level:"VIP",date:"2024-02-02",amount:5000},
  {id:3,name:"陳大文",email:"c@test.com",level:"一般",date:"2024-03-03",amount:900},
  {id:4,name:"林美麗",email:"d@test.com",level:"VIP",date:"2024-04-04",amount:8000},
  {id:5,name:"張志強",email:"e@test.com",level:"一般",date:"2024-05-05",amount:1500},
  {id:6,name:"黃佩琪",email:"f@test.com",level:"一般",date:"2024-06-06",amount:2300},
  {id:7,name:"吳建宏",email:"g@test.com",level:"VIP",date:"2024-07-07",amount:9200},
  {id:8,name:"周雅婷",email:"h@test.com",level:"一般",date:"2024-08-08",amount:1100}
];

function renderTable() {
  const table = document.getElementById("customerTable");
  table.innerHTML = "";

  customers.forEach((c, index) => {
    table.innerHTML += `
      <tr>
        <td>${c.id}</td>
        <td>
          <a href="#" onclick="showDetail(${index})">${c.name}</a>
        </td>
        <td>${c.email}</td>
        <td>
          <span data-bs-toggle="tooltip" title="VIP 享 9 折優惠">
            ${c.level}
          </span>
        </td>
        <td>${c.date}</td>
        <td>$${c.amount}</td>
        <td>
          <button class="btn btn-sm btn-success me-1" onclick="setVIP(${index})">標記為 VIP</button>
          <button class="btn btn-sm btn-danger" onclick="deleteCustomer(${index})">刪除</button>
        </td>
      </tr>
    `;
  });

  const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
  tooltipTriggerList.map(el => new bootstrap.Tooltip(el));
}

function setVIP(index) {
  customers[index].level = "VIP";
  alert("已成功升級為 VIP");
  renderTable();
}

function showDetail(index) {
  const c = customers[index];
  document.getElementById("modalContent").innerHTML = `
    <p><strong>顧客編號：</strong>${c.id}</p>
    <p><strong>姓名：</strong>${c.name}</p>
    <p><strong>Email：</strong>${c.email}</p>
    <p><strong>會員等級：</strong>${c.level}</p>
    <p><strong>註冊日期：</strong>${c.date}</p>
    <p><strong>累積消費：</strong>$${c.amount}</p>
  `;
  new bootstrap.Modal(document.getElementById('customerModal')).show();
}

function deleteCustomer(index) {
  if (confirm("確定要刪除這位顧客嗎？")) {
    customers.splice(index,1);
    renderTable();
  }
}

function addCustomer() {
  const id = customers.length + 1;
  customers.push({
    id,
    name:"新顧客"+id,
    email:`new${id}@test.com`,
    level:"一般",
    date:"2024-09-01",
    amount:1000
  });

  renderTable();

  const toast = new bootstrap.Toast(document.getElementById('toast'));
  toast.show();
}

function recalculate() {
  const loading = document.getElementById("loading");
  loading.style.display = "flex";

  setTimeout(() => {
    loading.style.display = "none";
  }, 1000);
}

renderTable();
</script>

</body>
</html>
