<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>顧客諮詢表單</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .form-title {
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h3 class="form-title text-center">顧客諮詢表單</h3>

        <!-- Alert -->
        <div id="alertBox"></div>

        <form id="contactForm">

            <!-- 姓名 -->
            <div class="mb-3">
                <label class="form-label">姓名 *</label>
                <input type="text" class="form-control" id="name" required>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email *</label>
                <input type="email" class="form-control" id="email" required>
            </div>

            <!-- 電話 -->
            <div class="mb-3">
                <label class="form-label">電話（選填）</label>
                <input type="tel" class="form-control" id="phone">
            </div>

            <!-- 諮詢類型 -->
            <div class="mb-3">
                <label class="form-label">諮詢類型</label>
                <select class="form-select" id="type">
                    <option value="">請選擇</option>
                    <option>產品問題</option>
                    <option>價格方案</option>
                    <option>合作提案</option>
                    <option>售後服務</option>
                </select>
            </div>

            <!-- 希望聯絡方式 -->
            <div class="mb-3">
                <label class="form-label">希望聯絡方式</label><br>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="contactMethod" value="Email">
                    <label class="form-check-label">Email</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="contactMethod" value="電話">
                    <label class="form-check-label">電話</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="contactMethod" value="Line">
                    <label class="form-check-label">Line</label>
                </div>
            </div>

            <!-- 想了解項目 -->
            <div class="mb-3">
                <label class="form-label">想了解項目</label><br>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="功能細節" name="interest">
                    <label class="form-check-label">功能細節</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="試用" name="interest">
                    <label class="form-check-label">試用</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="報價" name="interest">
                    <label class="form-check-label">報價</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="交期" name="interest">
                    <label class="form-check-label">交期</label>
                </div>
            </div>

            <!-- 問題描述 -->
            <div class="mb-3">
                <label class="form-label">問題描述 *</label>
                <textarea class="form-control" id="message" rows="4" placeholder="請詳細描述您的問題，至少輸入 20 字以上，以便我們更精準地協助您。" required></textarea>
            </div>

            <!-- 附件 -->
            <div class="mb-3">
                <label class="form-label">附件上傳（選填）</label>
                <input type="file" class="form-control" id="file">
            </div>

            <!-- 同意條款 -->
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="agree" required>
                <label class="form-check-label">我已閱讀並同意條款 *</label>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100">送出</button>

        </form>
    </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="successToast" class="toast align-items-center text-bg-success border-0">
        <div class="d-flex">
            <div class="toast-body">
                送出成功！
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const alertBox = document.getElementById('alertBox');
    alertBox.innerHTML = '';

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const message = document.getElementById('message').value.trim();
    const agree = document.getElementById('agree').checked;

    let errors = [];

    // Email 正則
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!name) {
        errors.push("請填寫姓名");
    }

    if (!email) {
        errors.push("請填寫 Email");
    } else if (!emailPattern.test(email)) {
        errors.push("Email 格式不正確");
    }

    if (!message) {
        errors.push("請填寫問題描述");
    } else if (message.length < 20) {
        errors.push("問題描述需至少 20 字以上");
    }

    if (!agree) {
        errors.push("請同意條款");
    }

    if (errors.length > 0) {
        alertBox.innerHTML = `
            <div class="alert alert-danger" role="alert">
                ${errors.map(err => `<div>• ${err}</div>`).join('')}
            </div>
        `;
        return;
    }

    // 收集資料
    const phone = document.getElementById('phone').value;
    const type = document.getElementById('type').value;
    const contactMethod = document.querySelector('input[name="contactMethod"]:checked')?.value || '';
    const interests = Array.from(document.querySelectorAll('input[name="interest"]:checked')).map(el => el.value);
    const file = document.getElementById('file').files[0]?.name || '';

    const formData = {
        name,
        email,
        phone,
        type,
        contactMethod,
        interests,
        message,
        file,
        agree
    };

    console.log('表單資料:', formData);

    // 顯示 Toast
    const toastEl = document.getElementById('successToast');
    const toast = new bootstrap.Toast(toastEl);
    toast.show();

    // 重置表單
    document.getElementById('contactForm').reset();
});
</script>

</body>
</html>
