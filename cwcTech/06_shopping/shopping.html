<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shopping.html</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #4F8CFF10, #A66CFF10), #F8FAFC;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* Glow Button */
.btn-glow {
  background: linear-gradient(90deg, #4F8CFF, #A66CFF);
  color: #fff;
  border: none;
  box-shadow: 0 0 10px #4F8CFF80;
  transition: all 0.3s ease;
}
.btn-glow:hover {
  box-shadow: 0 0 20px #A66CFF;
}

/* Product Card */
.product-card {
  background: #fff;
  border-radius: 16px;
  padding: 30px;
  max-width: 420px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.08);
  text-align: center;
}

.product-img {
  max-width: 100%;
  border-radius: 12px;
  margin-bottom: 20px;
}

.product-desc {
  color: #555;
  font-size: 0.95rem;
  margin-bottom: 15px;
}

.cta-text {
  color: #4F8CFF;
  font-weight: bold;
  margin-bottom: 20px;
}

/* Modal */
.modal-content {
  border-radius: 16px;
}

/* Price */
.price {
  font-size: 1.5rem;
  color: #4F8CFF;
  font-weight: bold;
}
.old-price {
  text-decoration: line-through;
  color: #999;
  margin-left: 10px;
}

/* Loading */
#loadingBox {
  display: none;
}

/* Grid */
.bg-grid {
  background-image: linear-gradient(#eaeef5 1px, transparent 1px),
                    linear-gradient(90deg, #eaeef5 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Center */
.center-box {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
</style>
</head>

<body class="bg-grid">

<div class="center-box">
  <div class="product-card">

    <img src="images/product1.png" class="product-img">

    <h5 class="fw-bold mb-3">CwC AI 簡報筆</h5>

    <p class="product-desc">
讓簡報不再卡關，從內容優化到現場提示，全程由 AI 精準輔助。CwC AI 簡報筆以輕科技流暢體驗，縮短準備時間、穩定表現節奏，讓你每一次開口都更有說服力與專業感。
    </p>

    <div class="cta-text">
      🚀 立即升級簡報力，讓每次登場都更專業！
    </div>

    <button class="btn btn-glow px-5 py-3 w-100" onclick="openShop()">立即購買</button>

  </div>
</div>

<!-- Toast -->
<div class="position-fixed top-0 end-0 p-3">
  <div id="toast" class="toast text-white bg-dark border-0">
    <div class="toast-body">
      已加入購物車 ✅
    </div>
  </div>
</div>

<!-- Purchase Modal -->
<div class="modal fade" id="shopModal">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content p-3">

      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">立即購買</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <div class="row g-4">
          <div class="col-md-5 text-center">
            <img src="images/product1.png" class="product-img">
          </div>

          <div class="col-md-7">

            <h5 class="mb-3 fw-bold">CwC AI 簡報筆</h5>

            <div class="mb-3">
              <span class="price">NT$399</span>
              <span class="old-price">NT$899</span>
            </div>

            <div class="mb-3">
              <label>數量：</label>
              <input type="number" id="qty" class="form-control w-50" min="1" max="10" value="1">
            </div>

            <div class="mb-3">
              <div>數量：<span id="qtyDisplay">1</span></div>
              <div>小計：NT$<span id="total">399</span></div>
            </div>

            <button class="btn btn-glow w-100 mb-3" id="checkoutBtn" onclick="checkout()">結帳</button>

            <div id="loadingBox" class="text-center">
              <div class="spinner-border text-primary"></div>
              <div>處理中…</div>
            </div>

          </div>
        </div>

      </div>

      <div class="modal-footer border-0">
        <button class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
      </div>

    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal fade" id="confirmModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content p-3">
      <div class="modal-header">
        <h5 class="modal-title">確認購買資訊</h5>
      </div>
      <div class="modal-body" id="confirmContent"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const price = 399;

function openShop() {
  new bootstrap.Modal(document.getElementById('shopModal')).show();
  new bootstrap.Toast(document.getElementById('toast')).show();
}

const qtyInput = document.getElementById('qty');

qtyInput.addEventListener('input', updateTotal);

function updateTotal() {
  let qty = parseInt(qtyInput.value);
  if (qty < 1) qty = 1;
  if (qty > 10) qty = 10;
  qtyInput.value = qty;

  document.getElementById('qtyDisplay').innerText = qty;
  document.getElementById('total').innerText = qty * price;
}

function checkout() {
  const qty = parseInt(qtyInput.value);
  const total = qty * price;

  console.log("數量:", qty);
  console.log("單價:", price);
  console.log("小計:", total);

  document.getElementById('loadingBox').style.display = 'block';
  document.getElementById('checkoutBtn').disabled = true;

  setTimeout(() => {
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('checkoutBtn').disabled = false;

    document.getElementById('confirmContent').innerHTML = `
      <p>產品名稱：CwC AI 簡報筆</p>
      <p>數量：${qty}</p>
      <p>單價：NT$${price}</p>
      <p><strong>總金額：NT$${total}</strong></p>
    `;

    new bootstrap.Modal(document.getElementById('confirmModal')).show();

  }, 1000);
}
</script>

</body>
</html>
