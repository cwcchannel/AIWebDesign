<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>藝術畫廊 Gallery</title>

  <!-- Swiper CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

  <style>
    body {
      margin: 0;
      background-color: #0d0d0d;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    /* ===== 畫廊區塊（高度：1/3 螢幕）===== */
    .gallery-section {
      height: 33.33vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .swiper {
      width: 90%;
      height: 100%;
    }

    /* 投影片 */
    .swiper-slide {
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      border-radius: 12px;
    }

    .swiper-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    /* 雜誌風 hover（微放大） */
    .swiper-slide:hover img {
      transform: scale(1.05);
    }

    /* 導覽箭頭（精品風） */
    .swiper-button-next,
    .swiper-button-prev {
      color: rgba(255, 255, 255, 0.8);
      transition: all 0.3s ease;
    }

    .swiper-button-next:hover,
    .swiper-button-prev:hover {
      color: #ffffff;
      transform: scale(1.15);
    }

    /* 分頁點（極簡長條風） */
    .swiper-pagination-bullet {
      background: rgba(255,255,255,0.4);
      opacity: 1;
    }

    .swiper-pagination-bullet-active {
      background: #ffffff;
      width: 22px;
      border-radius: 10px;
      transition: all 0.3s ease;
    }

  </style>
</head>

<body>

  <!-- 畫廊 Swiper -->
  <section class="gallery-section">

    <div class="swiper">
      <div class="swiper-wrapper">

        <!-- Slide 1 -->
        <div class="swiper-slide">
          <img src="https://picsum.photos/1920/1080?random=31" alt="">
        </div>

        <!-- Slide 2 -->
        <div class="swiper-slide">
          <img src="https://picsum.photos/1920/1080?random=32" alt="">
        </div>

        <!-- Slide 3 -->
        <div class="swiper-slide">
          <img src="https://picsum.photos/1920/1080?random=33" alt="">
        </div>

        <!-- Slide 4 -->
        <div class="swiper-slide">
          <img src="https://picsum.photos/1920/1080?random=34" alt="">
        </div>

        <!-- Slide 5 -->
        <div class="swiper-slide">
          <img src="https://picsum.photos/1920/1080?random=35" alt="">
        </div>

      </div>

      <!-- 分頁 -->
      <div class="swiper-pagination"></div>

      <!-- 導覽 -->
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>

    </div>

  </section>

  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <script>
    const swiper = new Swiper('.swiper', {
      loop: true,
      speed: 800,

      slidesPerView: 1,
      spaceBetween: 20,

      autoplay: {
        delay: 3000,
        disableOnInteraction: false,
      },

      pagination: {
        el: '.swiper-pagination',
        clickable: true,
      },

      navigation: {
        nextEl: '.swiper-button-next',
        prevEl: '.swiper-button-prev',
      },

      breakpoints: {
        768: {
          slidesPerView: 2
        },
        1200: {
          slidesPerView: 3
        }
      }
    });
  </script>

</body>
</html>
