<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精品咖啡展示</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Header -->
    <header class="py-5 text-center bg-white shadow-sm">
        <div class="container">
            <h1 class="fw-bold">精品咖啡選品</h1>
            <p class="text-muted">探索來自世界各地的頂級咖啡風味</p>
        </div>
    </header>

    <!-- Cards -->
    <section class="py-5">
        <div class="container">
            <div class="row g-4">

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card h-100 shadow-sm">
                        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93" class="card-img-top" style="height:220px; object-fit:cover;" alt="coffee">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">衣索比亞 耶加雪菲</h5>
                            <p class="card-text text-muted">帶有花香與柑橘酸質，口感清新細緻，是精品咖啡經典代表。</p>
                            <div class="mt-auto">
                                <a href="#" class="btn btn-dark w-100">查看詳情</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card h-100 shadow-sm">
                        <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085" class="card-img-top" style="height:220px; object-fit:cover;" alt="coffee">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">哥倫比亞 單品咖啡</h5>
                            <p class="card-text text-muted">酸甜平衡、口感滑順，帶有堅果與巧克力尾韻，適合日常品飲。</p>
                            <div class="mt-auto">
                                <a href="#" class="btn btn-dark w-100">查看詳情</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card h-100 shadow-sm">
                        <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348" class="card-img-top" style="height:220px; object-fit:cover;" alt="coffee">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">肯亞 AA 咖啡</h5>
                            <p class="card-text text-muted">濃郁莓果香與明亮酸值，層次豐富，帶來鮮明風味體驗。</p>
                            <div class="mt-auto">
                                <a href="#" class="btn btn-dark w-100">查看詳情</a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- CTA -->
    <section class="py-5 bg-white">
        <div class="container d-flex justify-content-center align-items-center">
            <a href="#" class="btn btn-lg btn-dark px-5">立即探索更多咖啡</a>
        </div>
    </section>

</body>
</html>
