<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>精品書店</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: "Helvetica Neue", sans-serif;
      background-color: #ffffff;
      color: #111;
    }
    .navbar {
      background-color: #fff;
      border-bottom: 1px solid #eee;
    }
    .hero {
      height: 90vh;
      background: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') center/cover no-repeat;
      color: #fff;
    }
    .hero-overlay {
      background: rgba(0, 0, 0, 0.5);
      height: 100%;
    }
    .section {
      padding: 80px 20px;
    }
    .footer {
      background-color: #111;
      color: #fff;
      padding: 40px 20px;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand fw-bold" href="#">Book Atelier</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto d-flex align-items-center">
        <li class="nav-item"><a class="nav-link" href="#">首頁</a></li>
        <li class="nav-item"><a class="nav-link" href="#">精選書籍</a></li>
        <li class="nav-item"><a class="nav-link" href="#">品牌理念</a></li>
        <li class="nav-item"><a class="nav-link" href="#">聯絡我們</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero d-flex justify-content-center align-items-center">
  <div class="hero-overlay w-100 d-flex justify-content-center align-items-center">
    <div class="text-center px-3">
      <h1 class="display-4 fw-bold">閱讀的藝術空間</h1>
      <p class="lead mt-3">精選每一本值得收藏的書籍，打造專屬你的知識品味</p>
      <a href="#" class="btn btn-light mt-4 px-4 py-2">立即探索</a>
    </div>
  </div>
</section>

<!-- Section 1 -->
<section class="section d-flex flex-column justify-content-center align-items-center text-center">
  <h2 class="fw-bold mb-3">精選書籍</h2>
  <p class="mb-4">每一本書都經過專業篩選，涵蓋設計、商業、科技與人文領域，為高端讀者打造專屬書單。</p>
  <a href="#" class="btn btn-dark px-4">查看書單</a>
</section>

<!-- Section 2 -->
<section class="section bg-light d-flex flex-column justify-content-center align-items-center text-center">
  <h2 class="fw-bold mb-3">品牌理念</h2>
  <p class="mb-4">我們相信閱讀是一種生活態度，透過書籍，建立深度思考與品味生活的能力。</p>
</section>

<!-- Section 3 -->
<section class="section d-flex flex-column justify-content-center align-items-center text-center">
  <h2 class="fw-bold mb-3">會員體驗</h2>
  <p class="mb-4">加入會員，享有專屬推薦、限量書籍與高端閱讀活動邀請。</p>
  <a href="#" class="btn btn-outline-dark px-4">立即加入</a>
</section>

<!-- Footer -->
<footer class="footer d-flex flex-column justify-content-center align-items-center text-center">
  <p class="mb-2">© 2026 Book Atelier</p>
  <p class="mb-0">打造高端閱讀體驗</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
