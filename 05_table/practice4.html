<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON 動態顧客資料表</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- DataTables CSS -->
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5">
    <h2 class="text-center mb-4">顧客資料表（JSON 動態渲染）</h2>

    <div class="table-responsive">
      <table id="data-table" class="table table-striped table-bordered text-center"></table>
    </div>
  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- DataTables JS -->
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

  <script>
    const customerData = [
      { id: "C001", name: "王小明", email: "ming.wang@example.com", level: "金卡", regDate: "2024-01-15" },
      { id: "C002", name: "李美麗", email: "mei.li@example.com", level: "銀卡", regDate: "2023-11-03" },
      { id: "C003", name: "陳大偉", email: "david.chen@example.com", level: "一般會員", regDate: "2025-02-20" },
      { id: "C004", name: "林志玲", email: "ling.lin@example.com", level: "金卡", regDate: "2022-07-18" },
      { id: "C005", name: "張家豪", email: "hao.zhang@example.com", level: "銀卡", regDate: "2024-06-09" },
      { id: "C006", name: "黃佩琪", email: "peiqi.huang@example.com", level: "一般會員", regDate: "2023-03-27" },
      { id: "C007", name: "吳建國", email: "guo.wu@example.com", level: "金卡", regDate: "2025-01-05" },
      { id: "C008", name: "蔡依婷", email: "ting.tsai@example.com", level: "銀卡", regDate: "2022-12-11" }
    ];

    const table = document.getElementById("data-table");

    // 建立 thead
    const thead = document.createElement("thead");
    thead.classList.add("table-primary");
    const headerRow = document.createElement("tr");

    const headers = [
      "顧客編號 (Customer ID)",
      "姓名 (Name)",
      "電子郵件 (Email)",
      "會員等級 (Membership Level)",
      "註冊日期 (Registration Date)"
    ];

    headers.forEach(text => {
      const th = document.createElement("th");
      th.textContent = text;
      headerRow.appendChild(th);
    });

    thead.appendChild(headerRow);
    table.appendChild(thead);

    // 建立 tbody
    const tbody = document.createElement("tbody");

    customerData.forEach(customer => {
      const row = document.createElement("tr");

      const values = [
        customer.id,
        customer.name,
        customer.email,
        customer.level,
        customer.regDate
      ];

      values.forEach(value => {
        const td = document.createElement("td");
        td.textContent = value;
        row.appendChild(td);
      });

      tbody.appendChild(row);
    });

    table.appendChild(tbody);

    // 初始化 DataTables
    $(document).ready(function () {
      $('#data-table').DataTable();
    });
  </script>

</body>
</html>
